<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>らくっく39 × HACCP ダッシュボード</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Yu Gothic UI',sans-serif;font-size:14px;background:#F5F5F3;color:#222;min-height:100vh}
.wrap{max-width:960px;margin:0 auto;padding:24px 20px 60px}
.header{background:#fff;border:1px solid #E0E0D8;border-radius:12px;padding:16px 20px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.brand{font-size:11px;color:#888;letter-spacing:.07em;margin-bottom:3px}
.page-title{font-size:20px;font-weight:600;color:#1a1a1a}
.btn-reload{padding:8px 16px;background:#1D9E75;color:#fff;border:none;border-radius:7px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px}
.btn-reload:hover{opacity:.9}
.btn-check{padding:8px 16px;background:#fff;color:#555;border:1px solid #CCC;border-radius:7px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;text-decoration:none}
.header-btns{display:flex;gap:8px;flex-wrap:wrap}
.loading{text-align:center;padding:40px;color:#888;font-size:14px}
.meal-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.meal-tab{padding:8px 20px;border:1.5px solid #D0D0C8;border-radius:8px;background:#fff;font-size:13px;font-weight:600;color:#555;cursor:pointer;font-family:inherit}
.meal-tab.active{background:#1D9E75;color:#fff;border-color:#1D9E75}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat{background:#fff;border:1px solid #E0E0D8;border-radius:10px;padding:14px 16px}
.stat-label{font-size:11px;color:#888;margin-bottom:6px}
.stat-val{font-size:26px;font-weight:600;color:#1a1a1a}
.stat-val.green{color:#1D9E75}
.stat-val.red{color:#E24B4A}
.stat-val.amber{color:#BA7517}
.stat-sub{font-size:11px;color:#888;margin-top:3px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
.card{background:#fff;border:1px solid #E0E0D8;border-radius:12px;overflow:hidden}
.card-head{display:flex;align-items:center;gap:8px;padding:10px 16px;background:#F8F8F5;border-bottom:1px solid #E8E8E0}
.card-icon{font-size:17px;color:#1D9E75}
.card-title{font-size:13px;font-weight:600;color:#1a1a1a}
.card-body{padding:14px 16px}
.chart-wrap{position:relative;height:220px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#F8F8F5;color:#888;font-weight:500;font-size:11px;padding:8px 10px;text-align:left;border-bottom:1px solid #E8E8E0;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid #F0F0E8;color:#222;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:#F8F8F5}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
.badge-ok{background:#E1F5EE;color:#0F6E56}
.badge-ng{background:#FCEBEB;color:#A32D2D}
.badge-dash{background:#F1EFE8;color:#888}
.badge-draft{background:#FAEEDA;color:#BA7517}
.badge-meal-朝食{background:#FFF3E0;color:#E65100}
.badge-meal-昼食{background:#E8F5E9;color:#1B5E20}
.badge-meal-夕食{background:#EDE7F6;color:#311B92}
.ng-list{list-style:none}
.ng-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid #F0F0E8;font-size:13px}
.ng-item:last-child{border-bottom:none}
.ng-dot{width:8px;height:8px;border-radius:50%;background:#E24B4A;flex-shrink:0;margin-top:4px}
.ng-date{color:#888;font-size:11px;white-space:nowrap}
.empty{text-align:center;padding:24px;color:#888;font-size:13px}
.period-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.period-btn{padding:5px 12px;border:1px solid #CCC;border-radius:6px;background:#fff;font-size:12px;cursor:pointer;color:#555}
.period-btn.active{background:#1D9E75;color:#fff;border-color:#1D9E75}
@media(max-width:640px){
  .summary{grid-template-columns:repeat(2,1fr)}
  .grid2{grid-template-columns:1fr}
  .wrap{padding:12px 12px 50px}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div>
      <div class="brand">らくっく39 × HACCP管理システム ／ <span id="facility-name-header">—</span></div>
      <div class="page-title">管理ダッシュボード</div>
    </div>
    <div class="header-btns">
      <a class="btn-check" href="index.html"><i class="ti ti-clipboard-check"></i> チェック記録へ</a>
      <button class="btn-reload" onclick="loadData()"><i class="ti ti-refresh"></i> 最新データ取得</button>
    </div>
  </div>

  <div class="period-row">
    <span style="font-size:12px;color:#888">表示期間：</span>
    <button class="period-btn active" onclick="setPeriod(7,this)">直近7日</button>
    <button class="period-btn" onclick="setPeriod(30,this)">直近30日</button>
    <button class="period-btn" onclick="setPeriod(90,this)">直近90日</button>
    <button class="period-btn" onclick="setPeriod(9999,this)">全期間</button>
    <button class="period-btn" onclick="setPeriod(-1,this)">日付指定</button>
  </div>
  <div id="date-range-row" style="display:none;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">
    <span style="font-size:12px;color:#888">期間：</span>
    <input type="date" id="date-from" style="border:1px solid #CCC;border-radius:6px;padding:5px 10px;font-size:13px;color:#222">
    <span style="font-size:12px;color:#888">〜</span>
    <input type="date" id="date-to" style="border:1px solid #CCC;border-radius:6px;padding:5px 10px;font-size:13px;color:#222">
    <button onclick="applyDateRange()" style="padding:5px 14px;background:#1D9E75;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer">適用</button>
  </div>

  <div class="meal-tabs">
    <button class="meal-tab active" id="mtab-all" onclick="setMealFilter('all',this)">全区分</button>
    <button class="meal-tab" id="mtab-朝食" onclick="setMealFilter('朝食',this)">朝食</button>
    <button class="meal-tab" id="mtab-昼食" onclick="setMealFilter('昼食',this)">昼食</button>
    <button class="meal-tab" id="mtab-夕食" onclick="setMealFilter('夕食',this)">夕食</button>
  </div>

  <div id="loading" class="loading"><i class="ti ti-loader"></i> データを読み込み中...</div>
  <div id="main" style="display:none">

    <div class="summary">
      <div class="stat">
        <div class="stat-label">総記録件数</div>
        <div class="stat-val" id="total-count">0</div>
        <div class="stat-sub">件</div>
      </div>
      <div class="stat">
        <div class="stat-label">全項目OK率</div>
        <div class="stat-val green" id="ok-rate">0%</div>
        <div class="stat-sub" id="ok-sub"></div>
      </div>
      <div class="stat">
        <div class="stat-label">NG発生件数</div>
        <div class="stat-val red" id="ng-count">0</div>
        <div class="stat-sub">件（期間内）</div>
      </div>
      <div class="stat">
        <div class="stat-label">直近記録日</div>
        <div class="stat-val amber" id="last-date" style="font-size:16px;padding-top:4px">—</div>
        <div class="stat-sub" id="last-staff"></div>
      </div>
    </div>

    <div class="grid2">
      <div class="card">
        <div class="card-head">
          <i class="ti ti-chart-bar card-icon"></i>
          <span class="card-title">項目別NG発生回数</span>
        </div>
        <div class="card-body">
          <div class="chart-wrap"><canvas id="ng-chart"></canvas></div>
        </div>
      </div>
      <div class="card">
        <div class="card-head">
          <i class="ti ti-temperature card-icon"></i>
          <span class="card-title">庫内温度推移</span>
        </div>
        <div class="card-body">
          <div class="chart-wrap"><canvas id="temp-chart"></canvas></div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div class="card-head">
        <i class="ti ti-alert-circle card-icon" style="color:#E24B4A"></i>
        <span class="card-title">NG・要注意記録</span>
      </div>
      <div class="card-body">
        <ul class="ng-list" id="ng-list"></ul>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <i class="ti ti-list card-icon"></i>
        <span class="card-title">記録一覧</span>
      </div>
      <div class="card-body" style="overflow-x:auto">
        <table id="record-table">
          <thead>
            <tr>
              <th>記録日</th>
              <th>区分</th>
              <th>ステータス</th>
              <th>食数</th>
              <th>①受入</th>
              <th>②庫内温度</th>
              <th>③-1交差汚染</th>
              <th>③-2器具洗浄</th>
              <th>③-3トイレ</th>
              <th>④-1健康管理</th>
              <th>④-2手洗い</th>
            </tr>
          </thead>
          <tbody id="record-tbody"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
function fmtDate(v){
  if(!v||v==='—') return '—';
  const s=String(v);
  const m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return m[1]+'-'+m[2]+'-'+m[3];
  return s;
}

const GAS_URL='https://script.google.com/macros/s/AKfycbxc_bseD-NLtKP-HQakcYljeXOYav05CZc3-9XglDj5gPJlEf0NxISkFbWWPy44ETxj/exec';
let allData=[];
let periodDays=7;
let mealFilter='all';
let ngChart=null;
let tempChart=null;

const CHECK_DEFS=[
  {key:'①結果', label:'①受入確認'},
  {key:'②結果', label:'②庫内温度'},
  {key:'③-1結果', label:'③-1交差汚染'},
  {key:'③-2結果', label:'③-2器具洗浄'},
  {key:'③-3結果', label:'③-3トイレ'},
  {key:'④-1結果', label:'④-1健康管理'},
  {key:'④-2結果', label:'④-2手洗い'}
];

function setPeriod(days,btn){
  periodDays=days;
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const dateRow=document.getElementById('date-range-row');
  if(days===-1){
    dateRow.style.display='flex';
    const today=new Date();
    const from=new Date();from.setDate(from.getDate()-30);
    document.getElementById('date-to').value=today.toISOString().slice(0,10);
    document.getElementById('date-from').value=from.toISOString().slice(0,10);
  } else {
    dateRow.style.display='none';
    renderAll();
  }
}

function setMealFilter(meal,btn){
  mealFilter=meal;
  document.querySelectorAll('.meal-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function applyDateRange(){
  const from=document.getElementById('date-from').value;
  const to=document.getElementById('date-to').value;
  if(!from||!to){alert('開始日と終了日を入力してください');return;}
  periodDays=-1;
  renderAllWithRange(from,to);
}

function renderAllWithRange(from,to){
  const fromDate=new Date(from+'T00:00:00');
  const toDate=new Date(to+'T23:59:59');
  const data=applyMealFilter(allData.filter(r=>{
    const d=new Date(String(r['記録日']).slice(0,10)+'T00:00:00');
    return d>=fromDate && d<=toDate;
  }));
  renderWithData(data);
}

async function loadData(){
  document.getElementById('loading').style.display='block';
  document.getElementById('main').style.display='none';
  try{
    // URLパラメータの施設名を優先（社長ダッシュボードからの遷移時）
    const urlParams=new URLSearchParams(window.location.search);
    const facilityName=urlParams.get('facility')||sessionStorage.getItem('haccp_facility')||'';
    document.getElementById('facility-name-header').textContent=facilityName||'—';
    // 社長からの遷移時はパンくずに戻るリンクを表示
    if(urlParams.get('facility')){
      const headerBtns=document.querySelector('.header-btns');
      if(headerBtns&&!document.getElementById('back-to-owner')){
        const backBtn=document.createElement('a');
        backBtn.id='back-to-owner';
        backBtn.href='owner-dashboard.html';
        backBtn.className='btn-check';
        backBtn.innerHTML='<i class="ti ti-arrow-left"></i> 社長ダッシュボードへ';
        headerBtns.insertBefore(backBtn,headerBtns.firstChild);
      }
    }
    const res=await fetch(GAS_URL+'?facilityName='+encodeURIComponent(facilityName)+'&t='+Date.now());
    const json=await res.json();
    allData=json.data||[];
    document.getElementById('loading').style.display='none';
    document.getElementById('main').style.display='block';
    renderAll();
  }catch(err){
    document.getElementById('loading').innerHTML='<i class="ti ti-alert-circle"></i> データの取得に失敗しました。再度お試しください。';
  }
}

function filterByPeriod(data){
  if(periodDays>=9999) return data;
  const cutoff=new Date();
  cutoff.setDate(cutoff.getDate()-periodDays);
  return data.filter(r=>{
    const d=new Date(r['記録日']);
    return d>=cutoff;
  });
}

function applyMealFilter(data){
  if(mealFilter==='all') return data;
  return data.filter(r=>r['区分']===mealFilter);
}

function badge(v){
  if(v==='OK') return '<span class="badge badge-ok">OK</span>';
  if(v==='NG') return '<span class="badge badge-ng">NG</span>';
  return '<span class="badge badge-dash">—</span>';
}

function statusBadge(v){
  if(v==='完了') return '<span class="badge badge-ok">完了</span>';
  if(v==='途中保存') return '<span class="badge badge-draft">途中保存</span>';
  return '<span class="badge badge-dash">'+(v||'—')+'</span>';
}

function mealBadge(v){
  const cls='badge-meal-'+(v||'');
  return '<span class="badge '+cls+'">'+(v||'—')+'</span>';
}

function hasNG(r){
  return CHECK_DEFS.some(d=>r[d.key]==='NG');
}

function staffSummary(r){
  const names=['①担当者','②担当者','③-1担当者','③-2担当者','③-3担当者','④-1担当者','④-2担当者']
    .map(k=>r[k]).filter(v=>v&&v!=='—');
  return [...new Set(names)].join('、');
}

function renderAll(){
  const data=applyMealFilter(filterByPeriod(allData));
  renderWithData(data);
}

function renderWithData(data){
  const sorted=[...data].sort((a,b)=>String(b['記録日']).localeCompare(String(a['記録日']))||['朝食','昼食','夕食'].indexOf(a['区分'])-['朝食','昼食','夕食'].indexOf(b['区分']));

  // サマリー
  document.getElementById('total-count').textContent=data.length;
  const ngRows=data.filter(hasNG);
  const okRows=data.filter(r=>CHECK_DEFS.every(d=>r[d.key]==='OK'));
  const okRate=data.length>0?Math.round(okRows.length/data.length*100):0;
  document.getElementById('ok-rate').textContent=okRate+'%';
  document.getElementById('ok-sub').textContent=okRows.length+'件 / '+data.length+'件';
  document.getElementById('ng-count').textContent=ngRows.length;
  if(sorted.length>0){
    document.getElementById('last-date').textContent=fmtDate(sorted[0]['記録日']);
    document.getElementById('last-staff').textContent=sorted[0]['区分']||'';
  } else {
    document.getElementById('last-date').textContent='—';
    document.getElementById('last-staff').textContent='';
  }

  // 項目別NGグラフ
  const ngLabels=CHECK_DEFS.map(d=>d.label);
  const ngCounts=CHECK_DEFS.map(d=>data.filter(r=>r[d.key]==='NG').length);

  if(ngChart) ngChart.destroy();
  const ctx1=document.getElementById('ng-chart').getContext('2d');
  ngChart=new Chart(ctx1,{
    type:'bar',
    data:{
      labels:ngLabels,
      datasets:[{
        label:'NG件数',
        data:ngCounts,
        backgroundColor:'#FCEBEB',
        borderColor:'#E24B4A',
        borderWidth:1,
        borderRadius:4
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        y:{beginAtZero:true,ticks:{stepSize:1},grid:{color:'#F0F0E8'}},
        x:{grid:{display:false},ticks:{font:{size:10}}}
      }
    }
  });

  // 庫内温度推移グラフ（朝食・昼食・夕食の3色）
  const MEAL_COLORS={
    '朝食':{border:'#E65100',bg:'rgba(230,81,0,0.1)'},
    '昼食':{border:'#1D9E75',bg:'rgba(29,158,117,0.1)'},
    '夕食':{border:'#311B92',bg:'rgba(49,27,146,0.1)'}
  };
  const meals=mealFilter==='all'?['朝食','昼食','夕食']:[mealFilter];
  const tempBase=[...data]
    .filter(r=>(r['②冷蔵温度(℃)']&&r['②冷蔵温度(℃)']!=='—')||(r['②冷凍温度(℃)']&&r['②冷凍温度(℃)']!=='—'))
    .sort((a,b)=>new Date(a['記録日'])-new Date(b['記録日']))
    .slice(-30);
  const tempLabels=[...new Set(tempBase.map(r=>fmtDate(r['記録日'])))];

  if(tempChart) tempChart.destroy();
  const ctx2=document.getElementById('temp-chart').getContext('2d');
  const tempDatasets=[];
  meals.forEach(meal=>{
    const mealData=tempBase.filter(r=>r['区分']===meal);
    const col=MEAL_COLORS[meal]||{border:'#999',bg:'rgba(153,153,153,0.1)'};
    if(mealData.length>0){
      // 冷蔵庫
      const hasCold=mealData.some(r=>r['②冷蔵温度(℃)']&&r['②冷蔵温度(℃)']!=='—');
      if(hasCold){
        tempDatasets.push({
          label:meal+'冷蔵(℃)',
          data:tempLabels.map(d=>{
            const r=mealData.find(x=>fmtDate(x['記録日'])===d);
            const v=r&&r['②冷蔵温度(℃)']&&r['②冷蔵温度(℃)']!=='—'?parseFloat(r['②冷蔵温度(℃)']):null;
            return v!==null?Math.round(v*10)/10:null;
          }),
          borderColor:col.border,
          backgroundColor:col.bg,
          borderWidth:2,pointRadius:3,tension:0.3,spanGaps:true,
          borderDash:[]
        });
      }
      // 冷凍庫
      const hasFrozen=mealData.some(r=>r['②冷凍温度(℃)']&&r['②冷凍温度(℃)']!=='—');
      if(hasFrozen){
        tempDatasets.push({
          label:meal+'冷凍(℃)',
          data:tempLabels.map(d=>{
            const r=mealData.find(x=>fmtDate(x['記録日'])===d);
            const v=r&&r['②冷凍温度(℃)']&&r['②冷凍温度(℃)']!=='—'?parseFloat(r['②冷凍温度(℃)']):null;
            return v!==null?Math.round(v*10)/10:null;
          }),
          borderColor:col.border,
          backgroundColor:col.bg,
          borderWidth:2,pointRadius:3,tension:0.3,spanGaps:true,
          borderDash:[4,3]
        });
      }
    }
  });
  tempChart=new Chart(ctx2,{
    type:'line',
    data:{labels:tempLabels,datasets:tempDatasets},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{legend:{display:true,position:'bottom',labels:{boxWidth:10,font:{size:11}}}},
      scales:{
        y:{grid:{color:'#F0F0E8'},ticks:{callback:v=>Math.round(v*10)/10+'℃'}},
        x:{grid:{display:false},ticks:{maxTicksLimit:7,font:{size:10}}}
      }
    }
  });

  // NGリスト
  const ngList=document.getElementById('ng-list');
  const ngItems=sorted.filter(hasNG).slice(0,10);
  if(ngItems.length===0){
    ngList.innerHTML='<div class="empty"><i class="ti ti-circle-check" style="color:#1D9E75;font-size:20px"></i><br>NG記録はありません</div>';
  } else {
    ngList.innerHTML=ngItems.map(r=>{
      const ngLabelsHit=CHECK_DEFS.filter(d=>r[d.key]==='NG');
      const notes=ngLabelsHit.map(d=>r[d.key.replace('結果','備考')]).filter(v=>v&&v!=='—').map(v=>'備考：'+v);
      return '<li class="ng-item"><div class="ng-dot"></div><div>'+
        '<span class="ng-date">'+fmtDate(r['記録日'])+' '+mealBadge(r['区分'])+' '+staffSummary(r)+'</span><br>'+
        'NG項目：'+ngLabelsHit.map(d=>d.label).join('、')+
        (notes.length?'<br>'+notes.join('<br>'):'')+'</div></li>';
    }).join('');
  }

  // 記録一覧テーブル
  const tbody=document.getElementById('record-tbody');
  if(sorted.length===0){
    tbody.innerHTML='<tr><td colspan="11" style="text-align:center;color:#888;padding:20px">記録がありません</td></tr>';
  } else {
    tbody.innerHTML=sorted.map(r=>{
      const tempText=[];
      if(r['②冷蔵温度(℃)']&&r['②冷蔵温度(℃)']!=='—') tempText.push('冷蔵'+r['②冷蔵温度(℃)']+'℃');
      if(r['②冷凍温度(℃)']&&r['②冷凍温度(℃)']!=='—') tempText.push('冷凍'+r['②冷凍温度(℃)']+'℃');
      return '<tr>'+
        '<td>'+fmtDate(r['記録日'])+'</td>'+
        '<td>'+mealBadge(r['区分'])+'</td>'+
        '<td>'+statusBadge(r['ステータス'])+'</td>'+
        '<td>'+(r['食数']||'—')+'</td>'+
        '<td>'+badge(r['①結果'])+'</td>'+
        '<td>'+badge(r['②結果'])+(tempText.length?' '+tempText.join('／'):'')+'</td>'+
        '<td>'+badge(r['③-1結果'])+'</td>'+
        '<td>'+badge(r['③-2結果'])+'</td>'+
        '<td>'+badge(r['③-3結果'])+'</td>'+
        '<td>'+badge(r['④-1結果'])+'</td>'+
        '<td>'+badge(r['④-2結果'])+'</td>'+
        '</tr>';
    }).join('');
  }
}

loadData();
</script>
</body>
</html>
